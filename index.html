<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Gastos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>Control de Gastos</h1>

    <button id="loginBtn">
        Iniciar sesión con Google
    </button>

    <button id="logoutBtn" style="display:none;">
        Cerrar sesión
    </button>

    <div id="app" style="display:none;">

        <div class="card">
            <h2>Ciclo Actual</h2>

            <p>Personal: $<span id="totalPersonal">0</span></p>

            <p>Pareja: $<span id="totalPareja">0</span></p>

            <p>Total: $<span id="totalGeneral">0</span></p>
        </div>

        <div class="card">

            <h2>Nuevo Gasto</h2>

            <input type="date" id="fecha">

            <input
                type="text"
                id="concepto"
                placeholder="Concepto">

            <input
                type="number"
                id="monto"
                placeholder="Monto">

            <select id="tipo">
                <option value="personal">Personal</option>
                <option value="pareja">Pareja</option>
            </select>

            <input
                type="text"
                id="categoria"
                placeholder="Categoría">

            <button id="guardarBtn">
                Guardar
            </button>

        </div>

<div class="card">
    <h2>Historial</h2>
    <button id="exportarBtn" style="background-color: #2e7d32; color: white; margin-bottom: 15px;">
        📊 Exportar Historial a Excel (.CSV)
    </button>

    <div id="listaGastos"></div>
</div>

        </div>

    </div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
